name: Spectra Validator

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  spectra-validate:
    name: Validate Spectra specs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Spectra validator
        run: python .github/scripts/spectra_validator.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spectra-validation-report
          path: spectra-report.md
